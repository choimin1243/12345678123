# .github/workflows/build.yml

name: Build HWP Merger

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'          # v1.0.0 같은 태그 푸시 시 릴리즈 자동 생성
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller pywin32

      - name: PyInstaller로 exe 빌드
        run: |
          pyinstaller --onefile --windowed --name "HWP합치기" hwp_merger.py

      - name: 빌드 결과물 업로드 (아티팩트)
        uses: actions/upload-artifact@v4
        with:
          name: HWP합치기-exe
          path: dist/HWP합치기.exe
          retention-days: 30

      # 태그(v*) 푸시 시 GitHub Release 자동 생성
      - name: GitHub Release 생성
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HWP합치기.exe
          name: "Release ${{ github.ref_name }}"
          body: |
            ## HWP / HWPX 파일 합치기 ${{ github.ref_name }}
            
            ### 사용 방법
            1. `HWP합치기.exe` 다운로드
            2. 실행 (Windows + 한글 설치 필요)
            3. HWP/HWPX 파일 추가 후 합치기
            
            ### 필요 환경
            - Windows 10/11
            - 한글(HWP) 설치
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

## 폴더 구조
```
your-repo/
├── .github/
│   └── workflows/
│       └── build.yml    ← 이 파일
├── hwp_merger.py        ← 메인 파이썬 파일
└── README.md
```

